id: 1c9f5d4e8a6b4f2c9d7e0a1b2c3d4e10
question: Which product categories combine high order value share and high late delivery rate?
sql: |-
  SELECT
    product_category,
    total_order_value,
    order_value_share,
    late_delivery_rate,
    average_review_score,
    review_score_gap_late_vs_on_time,
    pareto_order_value_bucket
  FROM workspace.olist_ecommerce.olist_category_diagnostics_mv
  WHERE order_value_share >= 0.01
    AND late_delivery_rate >= 0.08
  ORDER BY order_value_share DESC, late_delivery_rate DESC
  LIMIT 10
usage_guidance: |
  TRIGGER PHRASES:
    Use for: "high value and high risk", "important categories with late delivery", "where should operations focus"
  MANDATORY OUTPUT CONTRACT: product_category, order_value_share, late_delivery_rate, average_review_score
  MANDATORY ANTI-PATTERNS: Do not rank only by late delivery rate; include value share so prioritization accounts for impact.

