id: 1c9f5d4e8a6b4f2c9d7e0a1b2c3d4e08
question: To reach a 4.2 average review score, which categories need the largest late delivery rate reduction?
sql: |-
  SELECT
    product_category,
    average_review_score,
    late_delivery_rate,
    review_4_2_target_status,
    late_delivery_rate_needed_for_4_2_review,
    late_delivery_rate_reduction_gap_to_4_2_review,
    review_score_gap_late_vs_on_time,
    order_count
  FROM workspace.olist_ecommerce.olist_category_diagnostics_mv
  WHERE review_4_2_target_status = 'late_delivery_reduction_can_help'
    AND late_delivery_rate_reduction_gap_to_4_2_review IS NOT NULL
    AND late_delivery_rate_reduction_gap_to_4_2_review > 0
    AND order_count >= 100
  ORDER BY late_delivery_rate_reduction_gap_to_4_2_review DESC
  LIMIT 10
usage_guidance: |
  TRIGGER PHRASES:
    Use for: "to increase review score to 4.2", "what late delivery reduction is needed", "target review score gap"
  MANDATORY OUTPUT CONTRACT: product_category, average_review_score, late_delivery_rate, target status, required late delivery rate, reduction gap
  MANDATORY ANTI-PATTERNS: Do not claim causality; frame as a modeled target based on observed late-vs-on-time review score gap.
