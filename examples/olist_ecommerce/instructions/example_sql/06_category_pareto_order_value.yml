id: 1c9f5d4e8a6b4f2c9d7e0a1b2c3d4e06
question: Which product categories make up the top 80 percent of order value?
sql: |-
  SELECT
    order_value_rank,
    product_category,
    total_order_value,
    order_value_share,
    cumulative_order_value_share,
    pareto_order_value_bucket
  FROM workspace.olist_ecommerce.olist_category_diagnostics_mv
  WHERE pareto_order_value_bucket = 'pareto_top_80_value'
  ORDER BY order_value_rank
usage_guidance: |
  TRIGGER PHRASES:
    Use for: "Pareto by order value", "top 80 percent of sales", "which categories drive most value"
  MANDATORY OUTPUT CONTRACT: order_value_rank, product_category, total_order_value, order_value_share, cumulative_order_value_share
  MANDATORY ANTI-PATTERNS: Do not calculate Pareto from order-level rows when category diagnostics already has cumulative share.

