id: 1c9f5d4e8a6b4f2c9d7e0a1b2c3d4e01
question: What was total order value by month?
sql: |-
  SELECT
    purchase_month,
    ROUND(SUM(order_value), 2) AS total_order_value,
    COUNT(DISTINCT order_id) AS order_count
  FROM workspace.olist_ecommerce.olist_order_metrics_mv
  GROUP BY purchase_month
  ORDER BY purchase_month
usage_guidance: |
  TRIGGER PHRASES:
    Use for: "order value by month", "revenue trend", "monthly sales", "monthly order value"
  MANDATORY OUTPUT CONTRACT: purchase_month, total_order_value, order_count
  MANDATORY ANTI-PATTERNS: Do not group by purchase_date for monthly trends.

