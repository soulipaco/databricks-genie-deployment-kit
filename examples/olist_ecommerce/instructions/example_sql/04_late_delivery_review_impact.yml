id: 1c9f5d4e8a6b4f2c9d7e0a1b2c3d4e04
question: Do late deliveries have lower review scores than on-time deliveries?
sql: |-
  SELECT
    is_late_delivery,
    COUNT(DISTINCT order_id) AS reviewed_orders,
    ROUND(AVG(review_score), 2) AS average_review_score
  FROM workspace.olist_ecommerce.olist_order_metrics_mv
  WHERE has_review = true
    AND order_status = 'delivered'
  GROUP BY is_late_delivery
  ORDER BY is_late_delivery DESC
usage_guidance: |
  TRIGGER PHRASES:
    Use for: "late delivery impact on reviews", "late versus on-time review score", "delivery and satisfaction"
  MANDATORY OUTPUT CONTRACT: is_late_delivery, reviewed_orders, average_review_score
  MANDATORY ANTI-PATTERNS: Do not compare review scores without filtering to reviewed delivered orders.

