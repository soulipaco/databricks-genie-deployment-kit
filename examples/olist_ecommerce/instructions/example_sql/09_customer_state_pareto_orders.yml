id: 1c9f5d4e8a6b4f2c9d7e0a1b2c3d4e09
question: Which customer states drive the Pareto top 80 percent of order volume?
sql: |-
  SELECT
    order_count_rank,
    customer_state,
    order_count,
    order_count_share,
    cumulative_order_count_share,
    pareto_order_count_bucket
  FROM workspace.olist_ecommerce.olist_customer_state_diagnostics_mv
  WHERE pareto_order_count_bucket = 'pareto_top_80_orders'
  ORDER BY order_count_rank
usage_guidance: |
  TRIGGER PHRASES:
    Use for: "Pareto customer states", "top 80 percent of orders by state", "which states drive order volume"
  MANDATORY OUTPUT CONTRACT: order_count_rank, customer_state, order_count, order_count_share, cumulative_order_count_share
  MANDATORY ANTI-PATTERNS: Do not use seller_state when the question asks about customer states.

