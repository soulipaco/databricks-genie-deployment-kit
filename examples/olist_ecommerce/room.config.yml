room_name: olist_ecommerce_analytics
title: Olist E-Commerce Operations Analytics
description: |-
  E-commerce operations analytics room powered by the public Olist marketplace dataset.

  Supported analysis includes:
  - Order value, freight, and payment trends
  - Product category and geography performance
  - Delivery duration and late-delivery diagnostics
  - Review score and customer experience analysis
  - Seller and customer state comparisons

  Use natural-language business questions.
version: 2
purpose: Public portfolio demo for Databricks Genie, AI/BI dashboards, and deployment-as-code workflows
source_of_truth: repo
