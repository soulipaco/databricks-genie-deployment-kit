id: b1c2d3e4f5a6789012345678901234f6
display_name: Last Month
sql: >-
  month_start_date >= ADD_MONTHS(DATE_TRUNC('MONTH', CURRENT_DATE()), -1)
  AND month_start_date < DATE_TRUNC('MONTH', CURRENT_DATE())
synonyms:
  - prior month
  - previous month
instruction: |
  WHEN_TO_USE: Apply when the user asks for data from the previous calendar month.
  SCOPE_TABLES: sample_catalog.analytics_schema.sales_performance_mv.
  TIMEFRAME_HINT: previous full calendar month.
  RISK_IF_MISUSED: Do not confuse with rolling 30 days. This filter uses calendar month boundaries.
