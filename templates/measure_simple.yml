  - {{SYNONYM_1}}
  - {{SYNONYM_2}}
instruction: |                        # Optional - guidance for Genie
  WHEN_TO_USE: Use to calculate {{WHAT_IT_MEASURES}}.
  SCOPE_TABLES: {{TABLE_IDENTIFIER}}.
  RISK_IF_MISUSED: {{RISK_DESCRIPTION}}.
