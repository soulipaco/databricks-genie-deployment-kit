answer_format: SQL
sql: |-
  SELECT
    {{OUTPUT_COLUMN_1}},
    {{OUTPUT_COLUMN_2}}
  FROM {{CATALOG}}.{{SCHEMA}}.{{TABLE}}
  WHERE {{DATE_COL}} >= {{START_EXPR}}
    AND {{DATE_COL}} < {{END_EXCLUSIVE_EXPR}}
  GROUP BY ALL
  ORDER BY {{SORT_COLUMN}} DESC
  LIMIT {{N}}
