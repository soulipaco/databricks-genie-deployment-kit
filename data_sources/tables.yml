# data_sources/tables.yml — Table Registration
# Replace all {{PLACEHOLDER}} values with your actual table identifiers
# All identifiers must be 3-level: catalog.schema.table_name

tables:
  - identifier: "{{CATALOG}}.{{SCHEMA}}.{{TABLE_1}}"
    description: "{{TABLE_1_DESCRIPTION}}"
    column_metadata_file: "metadata/columns/{{TABLE_1}}.yml"
