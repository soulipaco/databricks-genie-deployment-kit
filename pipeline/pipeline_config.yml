# ============================================================================
# Pipeline Configuration — Action Plans Pipeline
# ============================================================================
# Fill in ALL {{PLACEHOLDER}} values before running any pipeline notebook.
# The pipeline will REFUSE TO START if any placeholder is detected.
#
# AGENTS: This is the single source of truth for all pipeline parameters.
# Notebooks must NOT contain hardcoded values. Read this file first.
# See pipeline/README.md for setup and configuration instructions.
# ============================================================================

# ── Genie Space ──────────────────────────────────────────────────────────────
genie:
  # The Genie space ID this pipeline analyses via Deep Research.
  # Find it in the Genie UI URL: .../genie/spaces/<space_id>
  # Also available in env/prod.yml
  space_id: "{{SPACE_ID}}"

# ── Unity Catalog ─────────────────────────────────────────────────────────────
catalog:
  # Catalog where all pipeline Delta tables will be created.
  # Must already exist; your service principal needs CREATE TABLE rights.
  name: "{{CATALOG_NAME}}"

  # Schema (database) within the catalog.
  # Will be created automatically if it does not exist.
  schema: "{{SCHEMA_NAME}}"

  # Short prefix for all table names — typically the room name or a short identifier.
  # Example: prefix "my_room" produces tables:
  #   my_room_trends_questions, my_room_trends_analysis, my_room_action_plan
  #   my_room_playbook_chunks, my_room_playbook_chunks_index
  table_prefix: "{{TABLE_PREFIX}}"

# ── Vector Search ─────────────────────────────────────────────────────────────
vector_search:
  # Name of an existing Vector Search endpoint, or a new name to provision one.
  endpoint: "{{VS_ENDPOINT_NAME}}"

  # Managed embedding model. Use a Databricks Foundation Model API endpoint name.
  embedding_model: "databricks-gte-large-en"

  # Number of playbook chunks to retrieve per query.
  num_results: 5

# ── LLM ──────────────────────────────────────────────────────────────────────
llm:
  # Databricks Model Serving endpoint for action plan generation.
  # Can be an External Model endpoint (Claude, GPT-*) or a Foundation Model endpoint.
  endpoint: "{{LLM_ENDPOINT_NAME}}"

  max_tokens: 4096
  temperature: 0.3

# ── Playbook PDFs ──────────────────────────────────────────────────────────────
# Where setup/vector_search.py reads playbook PDFs from.
# "volume"  — UC Volume path (recommended for Databricks production runs)
# "local"   — workspace path derived from this repo (generated by pipeline_playbook_generator)
#             The PDF must be committed/synced to the workspace before running vector_search.py.
playbooks:
  source_type: "{{volume_or_local}}"   # must be exactly "volume" or "local"

  # UC Volume path (required when source_type = "volume")
  # Format: /Volumes/<catalog>/<schema>/<volume_name>
  volume_path: "/Volumes/{{CATALOG_NAME}}/{{SCHEMA_NAME}}/{{VOLUME_NAME}}"

  # Relative path inside this repo where generated PDFs live (source_type = "local")
  # Generated by: python pipeline_playbook_generator/generate_playbook.py --kit-format genie_kit
  local_path: "pipeline_playbook_generator/generated/pdfs"

  # Registry of playbook PDFs.
  # Each entry maps one PDF file to a question_category for filtered VS retrieval.
  # Add one entry per domain this room covers.
  #
  # EXAMPLE:
  # sources:
  #   - pdf_file: "{{TABLE_PREFIX}}_sales_performance_action_playbook.pdf"
  #     question_category: "sales_performance"
  sources:
    - pdf_file: "{{PDF_FILE_NAME}}"
      question_category: "{{QUESTION_CATEGORY}}"

# ── Seed Questions ─────────────────────────────────────────────────────────────
# Questions sent to the Genie space via Genie Deep Research each pipeline run.
# One entry per domain. question_category must match a sources entry above.
#
# EXAMPLE (uncomment and adapt):
# questions:
#   seeds:
#     - category: "sales_performance"
#       question: >-
#         Analyze sales performance trends over the last 7 days and identify
#         any problematic deterioration or concentration. Focus on revenue,
#         pipeline value, close rate, average deal size, region, product tier,
#         and account manager segments that need action.
questions:
  seeds:
    - category: "{{QUESTION_CATEGORY}}"
      question: "{{SEED_QUESTION_TEXT}}"

# ── System Prompts ─────────────────────────────────────────────────────────────
# LLM system prompt per question_category, used by pipeline/action_plans.py.
# Keys must match the question_category values in questions.seeds above.
# Use YAML block scalar (|) for multi-line prompts.
#
# EXAMPLE (uncomment and adapt):
# system_prompts:
#   sales_performance: |
#     You are an expert sales performance analyst. You will receive:
#     1. A Trends Analysis Report identifying business metric shifts
#     2. Playbook Recommendations retrieved from the Sales Performance Playbook
#
#     Generate a concrete, prioritized action plan tailored to the issues identified
#     in the trends analysis.
#
#     Structure your response as:
#     - Immediate Actions (next 24-48 hours): fast containment and review actions
#     - Short-term Actions (1-2 weeks): enablement, prioritization, and process fixes
#     - Measurement Targets: specific KPI improvements expected and timeframes
#
#     Be specific. Reference KPI names such as revenue, pipeline value,
#     close rate, average deal size, and conversion rate. Avoid generic advice.
system_prompts:
  "{{QUESTION_CATEGORY}}": |
    {{SYSTEM_PROMPT_TEXT}}

# ── Workflow ──────────────────────────────────────────────────────────────────
workflow:
  # Name of the Databricks Workflow created by setup/create_workflow.py.
  name: "{{WORKFLOW_NAME}}"

  # Quartz cron schedule. Set to null to create an unscheduled job.
  # Default: daily at 07:00 UTC
  schedule_cron: "0 0 7 * * ?"
  timezone: "UTC"
